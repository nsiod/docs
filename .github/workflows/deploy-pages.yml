name: Deploy Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install d2
        run: |
          curl -fsSL -o /tmp/d2.tar.gz https://github.com/terrastruct/d2/releases/download/v0.7.1/d2-v0.7.1-linux-amd64.tar.gz
          mkdir -p /tmp/d2
          tar -xzf /tmp/d2.tar.gz -C /tmp/d2 --strip-components=1
          sudo install -m 0755 /tmp/d2/bin/d2 /usr/local/bin/d2
          d2 --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Rspress site
        run: bun run build

      - name: Disable Jekyll
        run: touch doc_build/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: doc_build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
